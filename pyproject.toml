[project]
name = "moe-infer-mlx"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "huggingface-hub>=1.15.0",
    "tqdm>=4.67.3",
]

[build-system]
requires = [
    "setuptools>=61.0",
    "cython>=3.0",
    "numpy>=1.20",
]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["moe_infer_mlx"]

[dependency-groups]
dev = [
    "maturin>=1.13.3",
]
