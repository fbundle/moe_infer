[project]
name = "moe-infer"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "huggingface-hub>=1.15.0",
    "openai>=2.37.0",
    "torch>=2.12.0",
    "tqdm>=4.67.3",
    "transformers>=5.9.0",
]

[build-system]
requires = [
    "setuptools>=61.0",
    "cython>=3.0",
    "numpy>=1.20",
]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["moe_infer"]

[tool.maturin]
bindings = "pyo3"
manifest-path = "moe_infer_rs/Cargo.toml"
features = ["python-bindings"]

[dependency-groups]
dev = [
    "maturin>=1.13.3",
]
